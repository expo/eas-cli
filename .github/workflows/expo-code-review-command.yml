name: AI code review (command)

# On-demand, ONE-SHOT reviewer triggered by a PR comment (maintainers only):
#   /review                        run once now; the router picks the agents
#   /review all                    run once with every agent
#   /review correctness security   run once with just those agents
# This never changes configuration. CONTINUOUS review is configured by labels
# (see expo-code-review.yml): add `ai-review` (or `ai-review:all` /
# `ai-review:<agent>`) to auto-review every push; `ai-review:skip` opts out.

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ai-code-review-cmd-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  command:
    # Only PR comments starting with /review, from a maintainer.
    if: >-
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '/review') &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    # Bound the run so a slow/stalled review fails fast rather than hanging.
    timeout-minutes: 50
    continue-on-error: true
    steps:
      - name: Parse command
        id: cmd
        env:
          # Via env (never inline ${{ }}) so an untrusted comment can't inject shell.
          COMMENT: ${{ github.event.comment.body }}
        run: |
          line=$(printf '%s' "$COMMENT" | head -n1 | tr -d '\r')
          verb=$(printf '%s' "$line" | awk '{print $1}')
          rest=$(printf '%s' "$line" | cut -s -d' ' -f2-)
          # Only /review (one-shot). Continuous review is label-driven, not a
          # comment; /review no longer changes any configuration.
          if [ "$verb" != "/review" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # Bare "/review" -> router picks; "all" -> every agent; names -> subset.
          # Sanitize agent ids to [a-z0-9,_-] to keep the value shell-safe.
          agents=""
          route=false
          if [ -z "$rest" ]; then
            route=true
          elif [ "$rest" != "all" ]; then
            agents=$(printf '%s' "$rest" | tr ' ' ',' | tr -cd 'a-zA-Z0-9,_-')
          fi
          echo "run=true" >> "$GITHUB_OUTPUT"
          echo "agents=$agents" >> "$GITHUB_OUTPUT"
          echo "route=$route" >> "$GITHUB_OUTPUT"

      - name: Acknowledge
        if: steps.cmd.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh api -X POST "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" -f content=eyes

      # SECURITY: `issue_comment` is NOT fork-restricted by GitHub — it always
      # runs in the base-repo context with full secrets and a write-scoped token,
      # regardless of whether the commented-on PR is from a fork. We therefore
      # check out and build ONLY the trusted base ref (the default branch) and
      # never `gh pr checkout` the PR head. Running attacker-controlled PR-head
      # code here (build scripts, edited cli.ts, install hooks) with
      # DO_NOT_USE_EXPERIMENTAL_ANTHROPIC_API_KEY and GH_TOKEN in the environment
      # would be a secret-exfiltration RCE that a maintainer typing `/review` on
      # a malicious PR triggers. The reviewer only needs the diff + PR metadata,
      # which it fetches over the API (`gh pr diff`/`gh pr view`), not a local
      # checkout of the PR branch.
      - name: Checkout (base ref only — never the PR head)
        if: steps.cmd.outputs.run == 'true'
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        # Shallow is enough: the reviewer reads the working tree and gets the diff
        # from the API (`gh pr diff`), not from local history.
        with:
          fetch-depth: 1

      - name: Enable Corepack
        if: steps.cmd.outputs.run == 'true'
        run: corepack enable

      - name: Set up Node
        if: steps.cmd.outputs.run == 'true'
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        if: steps.cmd.outputs.run == 'true'
        run: yarn install --immutable

      - name: Build reviewer
        if: steps.cmd.outputs.run == 'true'
        run: yarn workspace expo-code-review build

      - name: Run AI review
        if: steps.cmd.outputs.run == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DO_NOT_USE_EXPERIMENTAL_ANTHROPIC_API_KEY: ${{ secrets.DO_NOT_USE_EXPERIMENTAL_ANTHROPIC_API_KEY }}
          REVIEWER_MODEL: ${{ vars.REVIEWER_MODEL }}
          AGENTS: ${{ steps.cmd.outputs.agents }}
          ROUTE: ${{ steps.cmd.outputs.route }}
        run: |
          export PATH="$PWD/node_modules/.bin:$PATH"
          ARGS=""
          if [ -n "$AGENTS" ]; then
            ARGS="--agents $AGENTS"
          elif [ "$ROUTE" = "true" ]; then
            ARGS="--route"
          fi
          node packages/expo-code-review-cli/build/cli.js ci $ARGS
