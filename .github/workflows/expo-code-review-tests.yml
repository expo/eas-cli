name: expo-code-review unit tests

# Runs the reviewer package's unit suite whenever it changes. Unlike the review
# workflows this is a normal, blocking test gate (no continue-on-error) — a failing
# test should fail the check. Needs no secrets, so it runs safely on fork PRs.
on:
  pull_request:
    paths:
      - 'packages/expo-code-review-cli/**'
  push:
    branches: [main, add-ai-code-reviewer]
    paths:
      - 'packages/expo-code-review-cli/**'

permissions:
  contents: read

concurrency:
  group: ecr-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          fetch-depth: 1

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: yarn

      # Deps come from yarn (workspace-hoisted node_modules); bun is only the test runner.
      - name: Install dependencies
        run: yarn install --immutable

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Run unit tests
        run: yarn workspace expo-code-review test:unit
