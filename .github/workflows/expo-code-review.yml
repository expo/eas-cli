name: AI code review

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

# Comment-only: needs to read the repo and write PR comments (issue comments API).
permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ai-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    # Bound the run so a slow/stalled review (e.g. a very large diff hitting model
    # rate limits) fails fast instead of hanging toward the 6h default.
    timeout-minutes: 30
    # Opt-in / continuous mode: only auto-review PRs carrying the `ai-review`
    # label (added by the `/review` comment command). `/review-once` runs a single
    # review without the label, so it does not re-review later pushes.
    if: contains(github.event.pull_request.labels.*.name, 'ai-review')
    # A reviewer failure must never fail the PR's checks in phase 1.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        # The reviewer reads the working tree at HEAD and gets the diff from the
        # API (`gh pr diff`), so a shallow checkout is enough — no full history.
        with:
          fetch-depth: 1

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build reviewer
        run: yarn workspace expo-code-review build

      - name: Run AI review
        # node_modules/.bin holds the `opencode` binary the SDK spawns.
        run: |
          export PATH="$PWD/node_modules/.bin:$PATH"
          node packages/expo-code-review-cli/build/cli.js ci
        continue-on-error: true
        env:
          # GitHub token scoped by the permissions block above (PR comments only).
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Claude Pro/Max OAuth token (auth.mode "oauth" in .expo-code-review/
          # config.jsonc reads this env var). Not an x-api-key.
          DO_NOT_USE_EXPERIMENTAL_ANTHROPIC_API_KEY: ${{ secrets.DO_NOT_USE_EXPERIMENTAL_ANTHROPIC_API_KEY }}
          # Optional: override the model used by every agent.
          REVIEWER_MODEL: ${{ vars.REVIEWER_MODEL }}
