name: build-android
on:
  workflow_dispatch: {}

jobs:
  build:
    name: Build Android
    type: build
    runs_on: linux-large
    params:
      platform: android
      profile: system-test
  custom_job:
    name: Custom Job
    runs_on: linux-medium-nested-virtualization
    steps:
      - name: Echo
        run: echo "This is a custom job step"
      - uses: eas/start_android_emulator
